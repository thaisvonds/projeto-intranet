<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambientes de Teste - IGEN</title>
    <link rel="stylesheet" href="css/style.css"> <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--gray-100);
            flex-direction: column;
            gap: 20px;
        }

        .container-testes {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        .btn-teste {
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, filter 0.2s;
            font-size: 16px;
        }

        .btn-teste:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* Cores Baseadas no Projeto */
        .btn-preto { background-color: var(--gray-900); }
        .btn-verde { background-color: #28a745; }
        .btn-amarelo { background-color: #ffc107; color: #212529; }
        
        .titulo-selecao {
            color: var(--blue-primary);
            margin-bottom: 10px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container-testes">
        <h2 class="titulo-selecao">Selecione o Ambiente</h2>
        
        <a href="https://tst.igen.local/igen-web/manager/login/login.jsf" class="btn-teste btn-preto">IgenLab Preto</a>
        
        <a href="https://dev.igen.local/igen-web/manager/login/login.jsf" class="btn-teste btn-verde">IgenLab Verde</a>
        
        <a href="https://fix.igen.local/igen-web/manager/login/login.jsf" class="btn-teste btn-amarelo">IgenLab Amarelo</a>
    </div>

</body>
</html>
